<script>
(async () => {
  const repo = "Geo-BI-VrIJsselland/iconen";
  const baseUrl = `https://api.github.com/repos/${repo}/contents/`;
  const container = document.getElementById('container');

  try {
    const response = await fetch(baseUrl);

    if (!response.ok) {
      container.innerHTML = `<p>Fout bij laden (status ${response.status})</p>`;
      return;
    }

    const json = await response.json();

    if (!Array.isArray(json)) {
      container.innerHTML = `<p>GitHub API gaf geen lijst terug 😬</p>
      <pre>${JSON.stringify(json, null, 2)}</pre>`;
      return;
    }

    const folders = json.filter(file => file.type === 'dir');

    if (folders.length === 0) {
      container.innerHTML = `<p>Geen mappen gevonden</p>`;
      return;
    }

    for (let folder of folders) {

      let previewImg = '';
      try {
        const res = await fetch(baseUrl + folder.name);
        const files = await res.json();
        const img = files.find(f => f.name.endsWith('.png') || f.name.endsWith('.svg'));
        if (img) previewImg = img.download_url;
      } catch (e) {}

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="preview">
          ${previewImg ? `<img src="${previewImg}" alt="">` : '🗂️'}
        </div>
        <div class="title">${folder.name}</div>
        <div class="buttons">
          <a class="btn-map" href="https://github.com/${repo}/tree/master/${folder.name}" target="_blank">Open map</a>
        </div>
      `;

      container.appendChild(card);
    }

  } catch (err) {
    container.innerHTML = `<p>Script error 😬</p><pre>${err}</pre>`;
  }
})();
</script>
