<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Iconen overzicht</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: #1f4e79;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 { margin: 0; }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    img {
      max-height: 70px;
      margin-bottom: 10px;
    }

    .back {
      display: inline-block;
      margin-top: 10px;
      color: white;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1 id="title">Laden...</h1>
  <div id="backBtn"></div>
</header>

<div class="container" id="container"></div>

<script>
(async () => {

  const repo = "Geo-BI-VrIJsselland/iconen";
  const container = document.getElementById("container");
  const title = document.getElementById("title");
  const backBtn = document.getElementById("backBtn");

  const params = new URLSearchParams(window.location.search);
  const dir = params.get("dir");

  const path = dir ? `/${dir}` : "";
  const url = `https://api.github.com/repos/${repo}/contents${path}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!Array.isArray(data)) {
      container.innerHTML = "Fout bij laden 😬";
      return;
    }

    // Titel aanpassen
    title.innerText = dir ? dir : "Iconen overzicht";

    // Back knop
    if (dir) {
      backBtn.innerHTML = `<span class="back" onclick="window.location.href='?'">⬅ Terug</span>`;
    }

    for (let item of data) {

      const card = document.createElement("div");
      card.className = "card";

      // MAP → klikbaar
      if (item.type === "dir") {

        card.innerHTML = `
          <div style="font-size:40px;">📁</div>
          <div>${item.name}</div>
        `;

        card.onclick = () => {
          window.location.href = `?dir=${item.name}`;
        };
      }

      // BESTAND (icoon)
if (item.type === "file" && item.name.match(/\.(png|svg|jpg)$/i)) {

  card.innerHTML = `
    <img src="${item.download_url}">
    <div>${item.name}</div>
    <div class="copy-msg" style="font-size:11px;color:green;display:none;">Gekopieerd!</div>
  `;

  card.onclick = async () => {
    try {
      await navigator.clipboard.writeText(item.download_url);

      const msg = card.querySelector('.copy-msg');
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 1200);

    } catch (err) {
      alert("Kopiëren mislukt 😬");
    }
  };
}
      }

      container.appendChild(card);
    }

  } catch (e) {
    container.innerHTML = "Script fout 😬";
    console.error(e);
  }

})();
</script>

</body>
</html>
