<script>
(async () => {

  const repo = "Geo-BI-VrIJsselland/iconen";
  const container = document.getElementById("container");
  const title = document.getElementById("title");
  const backBtn = document.getElementById("backBtn");

  const params = new URLSearchParams(window.location.search);
  const dir = params.get("dir");

  const path = dir ? `/${dir}` : "";
  const url = `https://api.github.com/repos/${repo}/contents${path}`;

  try {
    const res = await fetch(url);

    if (!res.ok) {
      container.innerHTML = `Fout bij laden (${res.status})`;
      return;
    }

    const data = await res.json();

    if (!Array.isArray(data)) {
      container.innerHTML = `API fout 😬`;
      console.log(data);
      return;
    }

    title.innerText = dir ? dir : "Iconen overzicht";

    if (dir) {
      backBtn.innerHTML = `<span class="back" onclick="window.location.href='?'">⬅ Terug</span>`;
    }

    for (let item of data) {

      const card = document.createElement("div");
      card.className = "card";

      // 📁 MAP
      if (item.type === "dir") {

        card.innerHTML = `
          <div style="font-size:40px;">📁</div>
          <div>${item.name}</div>
        `;

        card.onclick = () => {
          window.location.href = `?dir=${item.name}`;
        };
      }

      // 🖼️ ICOON
      if (item.type === "file" && item.name.match(/\.(png|svg|jpg)$/i)) {

        card.innerHTML = `
          <img src="${item.download_url}">
          <div style="font-size:12px;">${item.name}</div>

          <div style="margin-top:8px;">
            <button class="copy-btn">📋 Kopieer</button>
            <a class="open-btn" href="${item.download_url}" target="_blank">🔗 Open</a>
          </div>

          <div class="copy-msg" style="display:none;font-size:11px;color:green;">
            Gekopieerd!
          </div>
        `;

        // 📋 kopieer knop
        card.querySelector(".copy-btn").onclick = async (e) => {
          e.stopPropagation();

          try {
            await navigator.clipboard.writeText(item.download_url);

            const msg = card.querySelector(".copy-msg");
            msg.style.display = "block";

            setTimeout(() => {
              msg.style.display = "none";
            }, 1200);

          } catch {
            alert("Kopiëren mislukt 😬");
          }
        };
      }

      container.appendChild(card);
    }

  } catch (e) {
    container.innerHTML = `Script fout 😬`;
    console.error(e);
  }

})();
</script>
