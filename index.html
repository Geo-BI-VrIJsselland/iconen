<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Iconen overzicht</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: #1f4e79;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h1 { margin: 0; }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .card:hover {
      transform: translateY(-5px);
    }

    img {
      max-height: 70px;
      margin-bottom: 10px;
    }

    button.copy-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }

    a.open-btn {
      background: #0078d4;
      color: white;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 11px;
      text-decoration: none;
      margin-left: 5px;
    }

    .back {
      display: inline-block;
      margin-top: 10px;
      color: white;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <h1 id="title">Laden...</h1>
  <div id="backBtn"></div>
</header>

<div class="container" id="container"></div>

<script>
(async () => {

  const repo = "Geo-BI-VrIJsselland/iconen";
  const branch = "main";

  const container = document.getElementById("container");
  const title = document.getElementById("title");
  const backBtn = document.getElementById("backBtn");

  const params = new URLSearchParams(window.location.search);
  const dir = params.get("dir");

  const baseRaw = `https://raw.githubusercontent.com/${repo}/${branch}/`;

  const res = await fetch(baseRaw + "index.json");
  const data = await res.json();

  // 📁 MAPPEN
  if (!dir) {
    title.innerText = "Iconen overzicht";

    for (let folder in data) {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div style="font-size:40px;">📁</div>
        <div>${folder}</div>
      `;

      card.onclick = () => {
        window.location.href = `?dir=${folder}`;
      };

      container.appendChild(card);
    }
  }

  // 🖼️ ICONEN
  if (dir && data[dir]) {

    title.innerText = dir;
    backBtn.innerHTML = `<span class="back" onclick="window.location.href='?'">⬅ Terug</span>`;

    for (let file of data[dir]) {

      const url = `${baseRaw}${dir}/${file}`;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${url}">
        <div style="font-size:12px;">${file}</div>

        <div style="margin-top:8px;">
          <button class="copy-btn">📋</button>
          <a class="open-btn" href="${url}" target="_blank">🔗</a>
        </div>

        <div class="copy-msg" style="display:none;font-size:11px;color:green;">
          Gekopieerd!
        </div>
      `;

      card.querySelector(".copy-btn").onclick = async (e) => {
        e.stopPropagation();

        await navigator.clipboard.writeText(url);

        const msg = card.querySelector(".copy-msg");
        msg.style.display = "block";

        setTimeout(() => msg.style.display = "none", 1000);
      };

      container.appendChild(card);
    }
  }

})();
</script>

</body>
</html>
