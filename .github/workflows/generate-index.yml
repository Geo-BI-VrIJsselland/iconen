name: Generate index.json

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate index.json
        run: |
          echo "{}" > index.json
          echo "{" > temp.json

          for dir in */ ; do
            dirname=$(basename "$dir")

            # skip hidden/system folders
            if [[ "$dirname" == ".github" ]]; then
              continue
            fi

            echo "  \"$dirname\": [" >> temp.json

            first=true
            for file in "$dir"*; do
              if [[ -f "$file" && "$file" =~ \.(png|svg|jpg)$ ]]; then
                filename=$(basename "$file")

                if [ "$first" = true ]; then
                  first=false
                else
                  echo "," >> temp.json
                fi

                echo -n "    \"$filename\"" >> temp.json
              fi
            done

            echo "" >> temp.json
            echo "  ]," >> temp.json
          done

          # laatste comma verwijderen
          sed '$ s/,$//' temp.json >> index.json
          echo "}" >> index.json

      - name: Commit index.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.json
          git commit -m "Auto update index.json" || echo "No changes"
          git push
